# Archipel Phase 2 — default curriculum configuration
#
# V1 dynamic top-k: 3 -> 2 -> 1 over warmup_steps, then freeze at k=1.
# This keeps exploration broad at the start, then tightens competition so
# functional specialization can emerge before resonance.

model:
  num_islands: 4
  input_dim: 128
  hidden_dim: 64
  ocean_dim: 32
  top_k: 2
  max_islands: 8
  min_islands: 2
  coherence_variance_threshold: 0.5

training:
  epochs: 50
  batch_size: 16
  lr: 1.0e-3
  device: cpu
  log_every: 10
  checkpoint_dir: checkpoints

data:
  num_samples: 2000
  input_dim: 128
  num_classes: 10
  signal_strength: 0.7

top_k_curriculum:
  enabled: true
  k_init: 3
  k_final: 1
  warmup_steps: 300
  freeze_step: null
