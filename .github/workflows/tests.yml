name: Archipel CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4
        with:
          # Full git history for version info
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install numpy pyyaml pytest
          pip install -e archipel/

      - name: Compile check (py_compile)
        run: |
          python -m py_compile \
            archipel/src/archipel/__init__.py \
            archipel/src/archipel/islands/base_island.py \
            archipel/src/archipel/islands/lifecycle.py \
            archipel/src/archipel/islands/specialization.py \
            archipel/src/archipel/ocean/ocean.py \
            archipel/src/archipel/current/router.py \
            archipel/src/archipel/current/courant.py \
            archipel/src/archipel/current/topk_curriculum.py \
            archipel/src/archipel/training/loop.py \
            archipel/src/archipel/training/loop_lifecycle.py \
            archipel/src/archipel/training/csv_logger.py \
            archipel/src/archipel/utils/specialization_matrix.py \
            archipel/train.py
        continue-on-error: false

      - name: Run unit tests (top-k curriculum)
        run: python -m pytest test_topk_curriculum.py -v --tb=short

      - name: Run unit tests (specialization)
        run: python -m pytest test_specialization.py -v --tb=short

      - name: Run unit tests (train script)
        run: python -m pytest test_train_script.py -v --tb=short

      - name: Run full test suite
        run: python -m pytest test_topk_curriculum.py test_specialization.py test_train_script.py -v --tb=short
